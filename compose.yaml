services:
  aqi-dashboard:
    image: python:3.12-slim
    container_name: aqi-dashboard
    network_mode: host
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./app:/app
    env_file:
      - .env
    environment:
      - HA_URL
      - HA_TOKEN
      - ENTITY_AQI=sensor.environmental_outdoor_sen55_aqi_outdoor
      - ENTITY_AQI_CORRECTED=sensor.outdoor_pm2_5_corrected_aqi
      - ENTITY_PM1=sensor.environmental_outdoor_sen55_pm1_0
      - ENTITY_PM25=sensor.environmental_outdoor_sen55_pm2_5
      - ENTITY_PM40=sensor.environmental_outdoor_sen55_pm4_0
      - ENTITY_PM10=sensor.environmental_outdoor_sen55_pm10
      - ENTITY_TEMP=sensor.environmental_outdoor_sen55_temperature
      - ENTITY_HUMIDITY=sensor.environmental_outdoor_sen55_humidity
      - ENTITY_PRESSURE=sensor.bme688_pressure_indoor_01
      - ENTITY_HEAT_INDEX=sensor.environmental_outdoor_sen55_heat_index_outdoor
      - ENTITY_DEW_POINT=sensor.environmental_outdoor_sen55_dew_point_outdoor
    command: |
      bash -c "pip install --no-cache-dir flask requests gunicorn &&
               gunicorn --bind 0.0.0.0:5080 --workers 2 app:app"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:5080/api/health')"
      interval: 30s
      timeout: 10s
      retries: 3
  nginx:
    image: nginx:alpine
    container_name: nginx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./blog/output:/var/www/blog:ro
    depends_on:
      - aqi-dashboard
networks: {}
