{% extends "base.html" %}

{% block title %}{{ article.title }} &mdash; {{ SITENAME }}{% endblock %}

{% block content %}
<article class="post-full">
    <header class="post-header">
        <div class="post-date">{{ article.date.strftime('%B %d, %Y') }}</div>
        <h2 class="post-title-large">{{ article.title }}</h2>
    </header>

    <div class="post-content">
        {{ article.content }}
    </div>

    <div class="post-back">
        <a href="{{ SITEURL }}/">&larr; All posts</a>
    </div>
</article>
{% endblock %}
