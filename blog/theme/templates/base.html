<pr!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #fafafa;
            --text-dim: #666;
            --card-bg: #141414;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        header h1 a {
            color: inherit;
            text-decoration: none;
        }

        .location {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .nav-link {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-decoration: none;
            margin-top: 0.4rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .nav-link + .nav-link { margin-left: 1.5rem; }

        .nav-link:hover { color: var(--text); }

        nav { margin-bottom: 3rem; }

        .hero {
            text-align: center;
            padding: 3rem 0 4rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .aqi-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        .post-list { display: flex; flex-direction: column; }

        .post-item {
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 10rem 1fr;
            gap: 1rem;
            align-items: baseline;
        }

        .post-date {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-top: 0.2rem;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
            display: block;
        }

        .post-title:hover { color: var(--text-dim); }

        .post-summary {
            grid-column: 2;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
            line-height: 1.6;
        }

        .empty-state {
            padding: 4rem 0;
            color: var(--text-dim);
            text-align: center;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .post-full { max-width: 720px; margin: 0 auto; }

        .post-header {
            padding: 3rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .post-title-large {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 500;
            line-height: 1.2;
            margin-top: 0.75rem;
        }

        .post-content { line-height: 1.8; color: #d4d4d4; }
        .post-content p { margin-bottom: 1.5rem; }
        .post-content h2 { font-size: 1.25rem; font-weight: 500; margin: 2.5rem 0 1rem; color: var(--text); }
        .post-content h3 { font-size: 1rem; font-weight: 500; margin: 2rem 0 0.75rem; color: var(--text); text-transform: uppercase; letter-spacing: 0.1em; }
        .post-content a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
        .post-content code { font-family: 'Space Mono', monospace; font-size: 0.85em; background: var(--card-bg); padding: 0.15em 0.4em; border: 1px solid var(--border); }
        .post-content pre { background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem; overflow-x: auto; margin: 1.5rem 0; }
        .post-content pre code { background: none; border: none; padding: 0; font-size: 0.875rem; line-height: 1.6; }
        .post-content img { max-width: 100%; border: 1px solid var(--border); margin: 1.5rem 0; }

        .post-back { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); }
        .post-back a { font-size: 0.875rem; color: var(--text-dim); text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
        .post-back a:hover { color: var(--text); }

        footer { text-align: center; padding-top: 2rem; margin-top: 4rem; border-top: 1px solid var(--border); }
        .footer-text { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
            .post-item { grid-template-columns: 1fr; gap: 0.25rem; }
            .post-summary { grid-column: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="{{ SITEURL }}/">AIR QUALITY BLOG</a></h1>
            <span class="location">Siem Reap, Cambodia</span>
        </header>
        <nav>
            <a href="https://air.siemreap.cloud" class="nav-link">AIR QUALITY</a>
            <a href="https://air.siemreap.cloud/learn/" class="nav-link">LEARN</a>
            <a href="https://air.siemreap.cloud/blog/" class="nav-link">BLOG</a>
        </nav>

        {% block content %}{% endblock %}

        <footer>
            <div class="footer-text">{{ SITENAME }} &mdash; Siem Reap, Cambodia</div>
        </footer>
    </div>
</body>
</html>
