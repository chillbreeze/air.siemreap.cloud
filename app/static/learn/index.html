<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality - Siem Reap</title>
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #fafafa;
            --text-dim: #666;
            --card-bg: #141414;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        header h1 a {
            color: inherit;
            text-decoration: none;
        }

        .location {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .nav-link {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-decoration: none;
            margin-top: 0.4rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .nav-link + .nav-link {
            margin-left: 1.5rem;
        }

        .nav-link:hover { color: var(--text); }

        nav { margin-bottom: 3rem; }

        .hero {
            text-align: center;
            padding: 3rem 0 4rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .hero-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .hero-title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            color: var(--text-dim);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        footer {
            text-align: center;
            padding-top: 2rem;
            margin-top: 4rem;
            border-top: 1px solid var(--border);
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">Air Quality Monitor</a></h1>
            <span class="location">Siem Reap, Cambodia</span>
        </header>
        <nav>
            <a href="/" class="nav-link">Air Quality</a>
            <a href="/learn/" class="nav-link">Learn</a>
            <a href="/blog/" class="nav-link">Blog</a>
        </nav>

        <div class="hero">
            <div class="hero-label">Learn</div>
            <div class="hero-title">Air Quality</div>
            <div class="hero-subtitle">Understanding the air we breathe</div>
        </div>

        <footer>
            <div class="footer-text">Air Quality Monitor &mdash; Siem Reap, Cambodia</div>
        </footer>
    </div>
</body>
</html>
