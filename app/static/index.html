<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Current air quality in Siem Reap, Cambodia."/>
    <meta content="air.siemreap.cloud" property="og:title" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://air.siemreap.cloud" />
    <title>Air Quality - Siem Reap</title>
    <link rel="icon" href="./images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
        <style>
        :root {
            --bg: #0a0a0a;
            --text: #fafafa;
            --text-dim: #666;
            --accent-good: #22c55e;
            --accent-moderate: #eab308;
            --accent-unhealthy-sensitive: #f97316;
            --accent-unhealthy: #ef4444;
            --accent-very-unhealthy: #a855f7;
            --accent-hazardous: #7f1d1d;
            --card-bg: #141414;
            --border: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .location {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .nav-link {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-decoration: none;
            margin-top: 0.4rem;
            display: inline-block;
            transition: color 0.2s;
        }

        .nav-link + .nav-link {
            margin-left: 1.5rem;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .hero {
            text-align: center;
            padding: 3rem 0 4rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .aqi-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .aqi-value {
            font-family: 'Space Mono', monospace;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            transition: color 0.5s ease;
        }

        .aqi-status {
            font-size: 1.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.5s ease;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .metric {
            background: var(--card-bg);
            padding: 2rem;
            text-align: center;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }

        .metric-value {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 700;
            line-height: 1;
        }

        .metric-unit {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .pm-section {
            margin-bottom: 3rem;
        }

        .pm-section h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }

        .pm-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .pm-card {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .pm-label {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .pm-value {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
        }

        .pm-unit {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        .pm-card-link, .metric-link, .hero-link {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: background 0.2s;
        }

        .pm-card-link:hover, .metric-link:hover, .hero-link:hover {
            background: #0f0f0f;
        }

        .footer-contact {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
        }

        .footer-contact a {
            color: var(--text-dim);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
        }

        .footer-contact a:hover { color: var(--text); }

        footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .updated {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .error-state h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* AQI color classes */
        .aqi-good { color: var(--accent-good); }
        .aqi-moderate { color: var(--accent-moderate); }
        .aqi-unhealthy-sensitive { color: var(--accent-unhealthy-sensitive); }
        .aqi-unhealthy { color: var(--accent-unhealthy); }
        .aqi-very-unhealthy { color: var(--accent-very-unhealthy); }
        .aqi-hazardous { color: var(--accent-hazardous); }

        /* Loading animation */
        .loading {
            opacity: 0.3;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            header {
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 2rem;
            }

            .hero {
                padding: 2rem 0 3rem;
            }

            .pm-grid {
                grid-template-columns: 1fr;
            }

            .metric {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Air Quality Monitor</h1>
            <span class="location">Siem Reap, Cambodia</span>
        </header>

        <main>
            <nav>
                <a href="/" class="nav-link">HOME</a>
                <a href="/faq/" class="nav-link">FAQ</a>
            </nav>

            <a href="/metric/aqi/" class="hero hero-link">
                <div class="aqi-label">Air Quality Index</div>
                <div class="aqi-value loading" id="aqi-raw">--</div>
                <div class="aqi-status" id="aqi-status">Loading...</div>
            </a>

            <section class="pm-section">
                <h2>Particulate Matter</h2>
                <div class="pm-grid">
                    <a href="/metric/pm1/" class="pm-card pm-card-link">
                        <div class="pm-label">PM 1.0</div>
                        <div class="pm-value loading" id="pm1">--</div>
                        <div class="pm-unit">&micro;g/m&sup3;</div>
                    </a>
                    <a href="/metric/pm25/" class="pm-card pm-card-link">
                        <div class="pm-label">PM 2.5</div>
                        <div class="pm-value loading" id="pm25">--</div>
                        <div class="pm-unit">&micro;g/m&sup3;</div>
                    </a>
                </div>
            </section>

            <section class="pm-section">
                <h2>Climate</h2>
                <div class="metrics-grid">
                    <a href="/metric/temperature/" class="metric metric-link">
                        <div class="metric-label">Temperature</div>
                        <div class="metric-value loading" id="temp">--</div>
                        <div class="metric-unit">&deg;C</div>
                    </a>
                    <a href="/metric/heat_index/" class="metric metric-link">
                        <div class="metric-label">Feels Like</div>
                        <div class="metric-value loading" id="heat-index">--</div>
                        <div class="metric-unit">&deg;C</div>
                    </a>

                    <a href="/metric/dew_point/" class="metric metric-link">
                        <div class="metric-label">Dew Point</div>
                        <div class="metric-value loading" id="dew-point">--</div>
                        <div class="metric-unit">&deg;C</div>
                    </a>
                    <a href="/metric/humidity/" class="metric metric-link">
                        <div class="metric-label">Humidity</div>
                        <div class="metric-value loading" id="humidity">--</div>
                        <div class="metric-unit">%</div>
                    </a>

                    <a href="/metric/pressure/" class="metric metric-link">
                        <div class="metric-label">Pressure</div>
                        <div class="metric-value loading" id="pressure">--</div>
                        <div class="metric-unit">hPa</div>
                    </a>
            </div>
            </section>
        </main>

        <footer>
            <div class="updated" id="updated">Last updated: --</div>
            <div class="footer-contact">
                <span>Built by Terry</span>
                <span>|</span>
                <a href="https://t.me/ProjectTerry" target="_blank">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.347l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.212z"/></svg>
                    Message me
                </a>
            </div>
        </footer>
    </div>

    <script>
        // Configuration - Update these entity IDs to match your Home Assistant setup
        const CONFIG = {
            // Home Assistant API endpoint (the backend will proxy this)
            apiEndpoint: '/api/states',
            
            // Entity IDs from Home Assistant - update these to match your setup
            entities: {
                aqi: 'sensor.pms5003_aqi_outdoor_01',
                pm1: 'sensor.pms5003_pm1_outdoor_01',
                pm25: 'sensor.pms5003_pm25_outdoor_01',
                pm10: 'sensor.pms5003_pm10_outdoor_01',
                temperature: 'sensor.sht30_temperature_outdoor_01',
                humidity: 'sensor.sht30_humidity_outdoor_01',
                pressure: 'sensor.sht30_pressuer_outdoor_01',
                heat_index: 'sensor.sht30_heatindex_outdoor_01',
                dew_point: 'sensor.sht30_dewpoint_outdoor_01'
            },
            
            // Refresh interval in milliseconds (30 seconds)
            refreshInterval: 30000
        };

        // AQI status mapping
        function getAqiStatus(aqi) {
            const value = parseInt(aqi);
            if (value <= 50) return { text: 'Good', class: 'aqi-good' };
            if (value <= 100) return { text: 'Moderate', class: 'aqi-moderate' };
            if (value <= 150) return { text: 'Unhealthy for Sensitive Groups', class: 'aqi-unhealthy-sensitive' };
            if (value <= 200) return { text: 'Unhealthy', class: 'aqi-unhealthy' };
            if (value <= 300) return { text: 'Very Unhealthy', class: 'aqi-very-unhealthy' };
            return { text: 'Hazardous', class: 'aqi-hazardous' };
        }

        // Format number for display
        function formatValue(value, decimals = 0) {
            const num = parseFloat(value);
            if (isNaN(num)) return '--';
            return num.toFixed(decimals);
        }

        // Update the DOM with new values
        function updateDisplay(data) {
            // Remove loading states
            document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));

            // Update AQI (corrected value for hero)
            const aqiEl = document.getElementById('aqi-raw');
            const statusEl = document.getElementById('aqi-status');
            if (data.aqi !== undefined) {
               //  const aqi = formatValue(data.aqi_corrected);
		const aqi = formatValue(data.aqi);
                aqiEl.textContent = aqi;
                const status = getAqiStatus(aqi);
                statusEl.textContent = status.text;
                aqiEl.className = 'aqi-value ' + status.class;
                statusEl.className = 'aqi-status ' + status.class;
            }

            // Update AQI Raw
            if (data.aqi !== undefined) {
                document.getElementById('aqi-raw').textContent = formatValue(data.aqi);
            }

            // Update PM values
            if (data.pm1 !== undefined) {
                document.getElementById('pm1').textContent = formatValue(data.pm1);
            }
            if (data.pm25 !== undefined) {
                document.getElementById('pm25').textContent = formatValue(data.pm25);
            }
            // Update environmental values
            if (data.temperature !== undefined) {
                document.getElementById('temp').textContent = formatValue(data.temperature, 0);
            }
            if (data.humidity !== undefined) {
                document.getElementById('humidity').textContent = formatValue(data.humidity, 0);
            }
            if (data.pressure !== undefined) {
                document.getElementById('pressure').textContent = formatValue(data.pressure, 0);
            }
            if (data.heat_index !== undefined) {
                document.getElementById('heat-index').textContent = formatValue(data.heat_index, 0);
            }
            if (data.dew_point !== undefined) {
                document.getElementById('dew-point').textContent = formatValue(data.dew_point, 0);
            }

            // Update timestamp
            document.getElementById('updated').textContent = 
                'Last updated: ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // Fetch data from the backend API
        async function fetchData() {
            try {
                const response = await fetch('/api/sensors');
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();
                updateDisplay(data);
            } catch (error) {
                console.error('Error fetching sensor data:', error);
            }
        }

        // Initial fetch and set up polling
        fetchData();
        setInterval(fetchData, CONFIG.refreshInterval);
    </script>
</body>
</html>
