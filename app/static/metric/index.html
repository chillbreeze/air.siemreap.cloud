        <script>
            let chart24h = null;
            let chart7d = null;
            let heatmapRefresh = null;

            function chartColors() {
                const light = document.documentElement.getAttribute('data-theme') === 'light';
                return {
                    grid: light ? '#e0e0e0' : '#222',
                    tick: light ? '#999' : '#666',
                    tooltipBg: light ? '#ffffff' : '#141414',
                    tooltipBorder: light ? '#e0e0e0' : '#222',
                    tooltipTitle: light ? '#999' : '#666',
                    tooltipBody: light ? '#111111' : '#fafafa',
                };
            }

            function getHeatmapBase() {
                return getComputedStyle(document.documentElement)
                    .getPropertyValue('--heatmap-base').trim()
                    .split(',').map(Number);
            }

            const METRICS = {
                pm1: {
                    label: "PM 1.0",
                    unit: "µg/m³",
                    color: "#a855f7",
                    bucketMinutes: 5,
                },
                pm25: {
                    label: "PM 2.5",
                    unit: "µg/m³",
                    color: "#f97316",
                    bucketMinutes: 5,
                },
                pm10: {
                    label: "PM 10",
                    unit: "µg/m³",
                    color: "#ef4444",
                    bucketMinutes: 5,
                },
                aqi: {
                    label: "AQI",
                    unit: "",
                    color: "#22c55e",
                    bucketMinutes: 5,
                },
                temperature: {
                    label: "Temperature",
                    unit: "°C",
                    color: "#eab308",
                    bucketMinutes: 5,
                },
                humidity: {
                    label: "Humidity",
                    unit: "%",
                    color: "#38bdf8",
                    bucketMinutes: 5,
                },
                pressure: {
                    label: "Pressure",
                    unit: "hPa",
                    color: "#94a3b8",
                    bucketMinutes: 5,
                },
                heat_index: {
                    label: "Feels Like",
                    unit: "°C",
                    color: "#fb923c",
                    bucketMinutes: 5,
                },
                dew_point: {
                    label: "Dew Point",
                    unit: "°C",
                    color: "#34d399",
                    bucketMinutes: 5,
                },
            };

            function downsample(data, bucketMinutes) {
                const bucketMs = bucketMinutes * 60 * 1000;
                const buckets = {};
                for (const point of data) {
                    const key =
                        Math.floor(point.x.getTime() / bucketMs) * bucketMs;
                    if (!buckets[key]) buckets[key] = [];
                    buckets[key].push(point.y);
                }
                return Object.entries(buckets)
                    .sort(([a], [b]) => a - b)
                    .map(([ts, vals]) => ({
                        x: new Date(Number(ts) + bucketMs / 2),
                        y: vals.reduce((s, v) => s + v, 0) / vals.length,
                    }));
            }

            const key = window.location.pathname.split("/").filter(Boolean)[1];
            const meta = METRICS[key] || {
                label: key,
                unit: "",
                color: "#fafafa",
            };

            document.getElementById("metric-name").textContent = meta.label;
            document.getElementById("metric-unit").textContent = meta.unit;
            document.title = `${meta.label} - Air Quality Siem Reap`;

            async function loadCurrent() {
                const res = await fetch("/api/sensors");
                if (!res.ok) return;
                const data = await res.json();
                const val = data[key];
                if (val === undefined) return;
                const decimals = key === "aqi" ? 0 : 1;
                const el = document.getElementById("current-value");
                el.textContent = val.toFixed(decimals);
                el.style.color = meta.color;
            }

            async function loadMinMax() {
                const res = await fetch(`/api/minmax/${key}`);
                if (!res.ok) return;
                const data = await res.json();
                const decimals = key === "aqi" ? 0 : 1;
                if (data.max !== null)
                    document.getElementById("mm-high").textContent =
                        data.max.toFixed(0);
                if (data.min !== null)
                    document.getElementById("mm-low").textContent =
                        data.min.toFixed(0);
            }

            async function loadChart() {
                const res = await fetch(`/api/history/${key}`);
                if (!res.ok) {
                    document.querySelector(".chart-wrapper").innerHTML =
                        '<div class="error-state">Failed to load data.</div>';
                    return;
                }
                const points = await res.json();
                if (!points.length) {
                    document.querySelector(".chart-wrapper").innerHTML =
                        '<div class="error-state">No data available.</div>';
                    return;
                }

                const raw = meta.bucketMinutes
                    ? downsample(
                          points.map((p) => ({
                              x: new Date(p.time),
                              y: p.value,
                          })),
                          meta.bucketMinutes,
                      )
                    : points.map((p) => ({ x: new Date(p.time), y: p.value }));

                const WINDOW = 15;
                const data = raw.map((point, i) => {
                    const start = Math.max(0, i - Math.floor(WINDOW / 2));
                    const end = Math.min(raw.length, start + WINDOW);
                    const slice = raw.slice(start, end);
                    const avg =
                        slice.reduce((sum, p) => sum + p.y, 0) / slice.length;
                    return { x: point.x, y: avg };
                });

                const updatesLabel = {
                    id: "updatesLabel",
                    afterDraw(chart) {
                        const {
                            ctx,
                            chartArea: { left, right, bottom },
                            height,
                        } = chart;
                        ctx.save();
                        ctx.font = '300 11px "DM Sans", sans-serif';
                        ctx.fillStyle = "#666";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "bottom";
                        ctx.fillText(
                            "Updates every 5 minutes",
                            (left + right) / 2,
                            height,
                        );
                        ctx.restore();
                    },
                };

                const c = chartColors();
                chart24h = new Chart(document.getElementById("chart"), {
                    type: "line",
                    data: {
                        datasets: [
                            {
                                data,
                                borderColor: meta.color,
                                borderWidth: 2,
                                pointRadius: 0,
                                tension: 0.3,
                                fill: true,
                                backgroundColor: meta.color + "18",
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        layout: {
                            padding: { bottom: 38 },
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: c.tooltipBg,
                                borderColor: c.tooltipBorder,
                                borderWidth: 1,
                                titleColor: c.tooltipTitle,
                                bodyColor: c.tooltipBody,
                                callbacks: {
                                    label: (ctx) =>
                                        `${ctx.parsed.y.toFixed(key === "aqi" ? 0 : 1)} ${meta.unit}`,
                                },
                            },
                        },
                        scales: {
                            x: {
                                type: "time",
                                time: {
                                    tooltipFormat: "HH:mm",
                                    displayFormats: { hour: "HH:mm" },
                                },
                                grid: { color: c.grid },
                                ticks: { color: c.tick, maxTicksLimit: 8 },
                            },
                            y: {
                                grid: { color: c.grid },
                                ticks: {
                                    color: c.tick,
                                    callback: (val) => `${val} ${meta.unit}`,
                                },
                            },
                        },
                    },
                    plugins: [updatesLabel],
                });
            }

            async function loadChart7d() {
                const res = await fetch(`/api/history7d/${key}`);
                if (!res.ok) {
                    document
                        .getElementById("chart7d")
                        .closest(".chart-wrapper").innerHTML =
                        '<div class="error-state">Failed to load data.</div>';
                    return;
                }
                const points = await res.json();
                if (!points.length) {
                    document
                        .getElementById("chart7d")
                        .closest(".chart-wrapper").innerHTML =
                        '<div class="error-state">No data available.</div>';
                    return;
                }

                const DAY_LABELS = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                const labels = points.map(
                    (p) => DAY_LABELS[new Date(p.date + "T12:00:00").getDay()],
                );
                const highs = points.map((p) => p.high);
                const lows = points.map((p) => p.low);

                const overallHigh = Math.max(...highs);
                const overallLow = Math.min(...lows);
                document.getElementById("mm7d-high").textContent =
                    overallHigh.toFixed(0);
                document.getElementById("mm7d-low").textContent =
                    overallLow.toFixed(0);

                const decimals = key === "aqi" ? 0 : 1;

                const c = chartColors();
                chart7d = new Chart(document.getElementById("chart7d"), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [
                            {
                                data: highs,
                                borderColor: meta.color,
                                borderWidth: 1.5,
                                pointRadius: 3,
                                tension: 0.3,
                                fill: "+1",
                                backgroundColor: meta.color + "26",
                            },
                            {
                                data: lows,
                                borderColor: meta.color,
                                borderWidth: 1.5,
                                pointRadius: 3,
                                tension: 0.3,
                                fill: "origin",
                                backgroundColor: meta.color + "59",
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: c.tooltipBg,
                                borderColor: c.tooltipBorder,
                                borderWidth: 1,
                                titleColor: c.tooltipTitle,
                                bodyColor: c.tooltipBody,
                                callbacks: {
                                    label: (ctx) => {
                                        const val =
                                            ctx.parsed.y.toFixed(decimals);
                                        return ctx.datasetIndex === 0
                                            ? `High: ${val} ${meta.unit}`
                                            : `Low: ${val} ${meta.unit}`;
                                    },
                                },
                            },
                        },
                        scales: {
                            x: {
                                grid: { color: c.grid },
                                ticks: { color: c.tick },
                            },
                            y: {
                                grid: { color: c.grid },
                                ticks: {
                                    color: c.tick,
                                    callback: (val) => `${val} ${meta.unit}`,
                                },
                            },
                        },
                    },
                });
            }

            async function loadHeatmap() {
                const currentYear = new Date().getFullYear();
                let selectedYear = currentYear;

                const calendar = document.getElementById("heatmap-calendar");
                const legendEl = document.getElementById("heatmap-legend");
                const tooltip = document.getElementById("heatmap-tooltip");
                const prevBtn = document.getElementById("heatmap-prev");
                const nextBtn = document.getElementById("heatmap-next");
                const yearLabel = document.getElementById("heatmap-year-label");

                const MONTHS_LONG = [
                    "January",
                    "February",
                    "March",
                    "April",
                    "May",
                    "June",
                    "July",
                    "August",
                    "September",
                    "October",
                    "November",
                    "December",
                ];
                const MONTHS_SHORT = [
                    "Jan",
                    "Feb",
                    "Mar",
                    "Apr",
                    "May",
                    "Jun",
                    "Jul",
                    "Aug",
                    "Sep",
                    "Oct",
                    "Nov",
                    "Dec",
                ];
                const DOW = ["S", "M", "T", "W", "T", "F", "S"];
                const DAY_NAMES = [
                    "Sun",
                    "Mon",
                    "Tue",
                    "Wed",
                    "Thu",
                    "Fri",
                    "Sat",
                ];
                const decimals = key === "aqi" ? 0 : 1;

function hexToRgb(hex) {
                    return [
                        parseInt(hex.slice(1, 3), 16),
                        parseInt(hex.slice(3, 5), 16),
                        parseInt(hex.slice(5, 7), 16),
                    ];
                }

                function getGradientColor(val, minVal, maxVal) {
                    if (minVal === maxVal) return meta.color;
                    const t = (val - minVal) / (maxVal - minVal);
                    const base = getHeatmapBase();
                    const end = hexToRgb(meta.color);
                    const r = Math.round(base[0] + t * (end[0] - base[0]));
                    const g = Math.round(base[1] + t * (end[1] - base[1]));
                    const b = Math.round(base[2] + t * (end[2] - base[2]));
                    return `rgb(${r},${g},${b})`;
                }

                function renderLegend(minVal, maxVal) {
                    legendEl.innerHTML = "";
                    if (minVal !== Infinity && maxVal !== -Infinity) {
                        const gradRow = document.createElement("div");
                        gradRow.className = "heatmap-legend-gradient";

                        const minLbl = document.createElement("span");
                        minLbl.className = "heatmap-gradient-label";
                        minLbl.textContent = `${minVal.toFixed(0)}${meta.unit ? " " + meta.unit : ""}`;

                        const blocks = document.createElement("div");
                        blocks.className = "heatmap-legend-blocks";
                        const base = getHeatmapBase();
                        const end = hexToRgb(meta.color);
                        for (let i = 0; i < 5; i++) {
                            const t = i / 4;
                            const r = Math.round(
                                base[0] + t * (end[0] - base[0]),
                            );
                            const g = Math.round(
                                base[1] + t * (end[1] - base[1]),
                            );
                            const b = Math.round(
                                base[2] + t * (end[2] - base[2]),
                            );
                            const block = document.createElement("div");
                            block.className = "heatmap-swatch";
                            block.style.backgroundColor = `rgb(${r},${g},${b})`;
                            blocks.appendChild(block);
                        }

                        const maxLbl = document.createElement("span");
                        maxLbl.className = "heatmap-gradient-label";
                        maxLbl.textContent = `${maxVal.toFixed(0)}${meta.unit ? " " + meta.unit : ""}`;

                        gradRow.appendChild(minLbl);
                        gradRow.appendChild(blocks);
                        gradRow.appendChild(maxLbl);
                        legendEl.appendChild(gradRow);
                    }
                }

                async function fetchAndRender(year) {
                    yearLabel.textContent = year;
                    nextBtn.disabled = year >= currentYear;
                    prevBtn.disabled = true;

                    const res = await fetch(`/api/heatmap/${key}?year=${year}`);
                    if (!res.ok) {
                        calendar.innerHTML = "";
                        legendEl.innerHTML = "";
                        return;
                    }
                    const points = await res.json();

                    prevBtn.disabled = points.length === 0;

                    const dataByDate = {};
                    let minVal = Infinity,
                        maxVal = -Infinity;
                    for (const p of points) {
                        dataByDate[p.date] = p.value;
                        if (p.value < minVal) minVal = p.value;
                        if (p.value > maxVal) maxVal = p.value;
                    }

                    const today = new Date();
                    today.setHours(23, 59, 59, 999);

                    calendar.innerHTML = "";

                    const jan1DOW = new Date(year, 0, 1).getDay();

                    function getWeekIdx(date) {
                        const dayOfYear = Math.round(
                            (date - new Date(year, 0, 1)) / 86400000,
                        );
                        return Math.floor((dayOfYear + jan1DOW) / 7);
                    }

                    const numWeeks = getWeekIdx(new Date(year, 11, 31)) + 1;

                    const monthWeekStarts = [];
                    for (let m = 0; m < 12; m++) {
                        monthWeekStarts.push(getWeekIdx(new Date(year, m, 1)));
                    }

                    const gh = document.createElement("div");
                    gh.className = "heatmap-github";

                    const corner = document.createElement("div");
                    corner.className = "heatmap-gh-corner";
                    gh.appendChild(corner);

                    const dowEl = document.createElement("div");
                    dowEl.className = "heatmap-gh-dow";
                    for (const d of DOW) {
                        const span = document.createElement("span");
                        span.textContent = d;
                        dowEl.appendChild(span);
                    }
                    gh.appendChild(dowEl);

                    const monthTop = document.createElement("div");
                    monthTop.className = "heatmap-month-top";
                    monthTop.style.setProperty("--num-weeks", numWeeks);
                    for (let m = 0; m < 12; m++) {
                        const lbl = document.createElement("span");
                        lbl.className = "heatmap-mlabel";
                        lbl.style.gridColumn = `${monthWeekStarts[m] + 1} / ${m < 11 ? monthWeekStarts[m + 1] + 1 : numWeeks + 1}`;
                        lbl.textContent = MONTHS_SHORT[m];
                        monthTop.appendChild(lbl);
                    }
                    gh.appendChild(monthTop);

                    const weeksGrid = document.createElement("div");
                    weeksGrid.className = "heatmap-weeks";
                    weeksGrid.style.setProperty("--num-weeks", numWeeks);

                    for (let m = 0; m < 12; m++) {
                        const daysInMonth = new Date(year, m + 1, 0).getDate();
                        for (let d = 1; d <= daysInMonth; d++) {
                            const date = new Date(year, m, d);
                            const dow = date.getDay();
                            const wIdx = getWeekIdx(date);
                            const dateStr = `${year}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
                            const val = dataByDate[dateStr];

                            const cell = document.createElement("div");
                            cell.className = "heatmap-cell";
                            cell.style.setProperty("--week", wIdx + 1);
                            cell.style.setProperty("--dow", dow + 1);

                            if (val === undefined || date > today) {
                                cell.classList.add("heatmap-cell-empty");
                            } else {
                                cell.style.backgroundColor = getGradientColor(val, minVal, maxVal);
                                const formatted = `${DAY_NAMES[dow]}, ${d} ${MONTHS_SHORT[m]} ${year}`;
                                const valueStr = `${val.toFixed(decimals)}${meta.unit ? " " + meta.unit : ""}`;
                                cell.addEventListener("mouseenter", () => {
                                    tooltip.textContent = `${formatted} · ${valueStr}`;
                                    tooltip.style.display = "block";
                                });
                                cell.addEventListener("mousemove", (e) => {
                                    const tw = tooltip.offsetWidth;
                                    let left = e.clientX + 14;
                                    if (left + tw > window.innerWidth - 4) {
                                        left = e.clientX - tw - 14;
                                    }
                                    tooltip.style.left = Math.max(4, left) + "px";
                                    tooltip.style.top = e.clientY - 32 + "px";
                                });
                                cell.addEventListener("mouseleave", () => {
                                    tooltip.style.display = "none";
                                });
                            }
                            weeksGrid.appendChild(cell);
                        }
                    }
                    gh.appendChild(weeksGrid);
                    calendar.appendChild(gh);

                    renderLegend(minVal, maxVal);
                }

                prevBtn.addEventListener("click", () => {
                    if (prevBtn.disabled) return;
                    selectedYear--;
                    fetchAndRender(selectedYear);
                });

                nextBtn.addEventListener("click", () => {
                    if (nextBtn.disabled) return;
                    selectedYear++;
                    fetchAndRender(selectedYear);
                });

                fetchAndRender(selectedYear);
                heatmapRefresh = () => fetchAndRender(selectedYear);
            }

            loadCurrent();
            loadMinMax();
            loadChart();
            loadChart7d();
            loadHeatmap();

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                if (isLight) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                }
                const c = chartColors();
                for (const chart of [chart24h, chart7d]) {
                    if (!chart) continue;
                    chart.options.scales.x.grid.color = c.grid;
                    chart.options.scales.x.ticks.color = c.tick;
                    chart.options.scales.y.grid.color = c.grid;
                    chart.options.scales.y.ticks.color = c.tick;
                    chart.options.plugins.tooltip.backgroundColor = c.tooltipBg;
                    chart.options.plugins.tooltip.borderColor = c.tooltipBorder;
                    chart.options.plugins.tooltip.titleColor = c.tooltipTitle;
                    chart.options.plugins.tooltip.bodyColor = c.tooltipBody;
                    chart.update();
                }
                if (heatmapRefresh) heatmapRefresh();
            });
        </script>
    </body>
</html>
