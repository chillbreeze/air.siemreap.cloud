    <script>
        const METRICS = {
            pm1:        { label: 'PM 1.0',       unit: 'µg/m³', color: '#a855f7', bucketMinutes: 5 },
            pm25:       { label: 'PM 2.5',       unit: 'µg/m³', color: '#f97316', bucketMinutes: 5 },
            pm10:       { label: 'PM 10',         unit: 'µg/m³', color: '#ef4444', bucketMinutes: 5 },
            aqi:        { label: 'AQI',           unit: '',      color: '#22c55e', bucketMinutes: 5 },
            temperature:{ label: 'Temperature',  unit: '°C',    color: '#eab308', bucketMinutes: 5 },
            humidity:   { label: 'Humidity',      unit: '%',     color: '#38bdf8', bucketMinutes: 5 },
            pressure:   { label: 'Pressure',      unit: 'hPa',   color: '#94a3b8', bucketMinutes: 5 },
            heat_index: { label: 'Feels Like',    unit: '°C',    color: '#fb923c', bucketMinutes: 5 },
            dew_point:  { label: 'Dew Point',     unit: '°C',    color: '#34d399', bucketMinutes: 5 },
        };

        function downsample(data, bucketMinutes) {
            const bucketMs = bucketMinutes * 60 * 1000;
            const buckets = {};
            for (const point of data) {
                const key = Math.floor(point.x.getTime() / bucketMs) * bucketMs;
                if (!buckets[key]) buckets[key] = [];
                buckets[key].push(point.y);
            }
            return Object.entries(buckets)
                .sort(([a], [b]) => a - b)
                .map(([ts, vals]) => ({
                    x: new Date(Number(ts) + bucketMs / 2),
                    y: vals.reduce((s, v) => s + v, 0) / vals.length
                }));
        }

        const key = window.location.pathname.split('/').filter(Boolean)[1];
        const meta = METRICS[key] || { label: key, unit: '', color: '#fafafa' };

        document.getElementById('metric-name').textContent = meta.label;
        document.getElementById('metric-unit').textContent = meta.unit;
        document.title = `${meta.label} - Air Quality Siem Reap`;

        async function loadCurrent() {
            const res = await fetch('/api/sensors');
            if (!res.ok) return;
            const data = await res.json();
            const val = data[key];
            if (val === undefined) return;
            const decimals = key === 'aqi' ? 0 : 1;
            const el = document.getElementById('current-value');
            el.textContent = val.toFixed(decimals);
            el.style.color = meta.color;
        }

        async function loadMinMax() {
            const res = await fetch(`/api/minmax/${key}`);
            if (!res.ok) return;
            const data = await res.json();
            const decimals = key === 'aqi' ? 0 : 1;
            if (data.max !== null) document.getElementById('mm-high').textContent = data.max.toFixed(0);
            if (data.min !== null) document.getElementById('mm-low').textContent = data.min.toFixed(0);
        }

        async function loadChart() {
            const res = await fetch(`/api/history/${key}`);
            if (!res.ok) {
                document.querySelector('.chart-wrapper').innerHTML =
                    '<div class="error-state">Failed to load data.</div>';
                return;
            }
            const points = await res.json();
            if (!points.length) {
                document.querySelector('.chart-wrapper').innerHTML =
                    '<div class="error-state">No data available.</div>';
                return;
            }

            const raw = meta.bucketMinutes
                ? downsample(points.map(p => ({ x: new Date(p.time), y: p.value })), meta.bucketMinutes)
                : points.map(p => ({ x: new Date(p.time), y: p.value }));

            const WINDOW = 15;
            const data = raw.map((point, i) => {
                const start = Math.max(0, i - Math.floor(WINDOW / 2));
                const end = Math.min(raw.length, start + WINDOW);
                const slice = raw.slice(start, end);
                const avg = slice.reduce((sum, p) => sum + p.y, 0) / slice.length;
                return { x: point.x, y: avg };
            });

            const updatesLabel = {
                id: 'updatesLabel',
                afterDraw(chart) {
                    const { ctx, chartArea: { left, right, bottom }, height } = chart;
                    ctx.save();
                    ctx.font = '300 11px "DM Sans", sans-serif';
                    ctx.fillStyle = '#666';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('Updates every 5 minutes', (left + right) / 2, height);
                    ctx.restore();
                }
            };

            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    datasets: [{
                        data,
                        borderColor: meta.color,
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                        backgroundColor: meta.color + '18',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    layout: {
                        padding: { bottom: 38 }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#141414',
                            borderColor: '#222',
                            borderWidth: 1,
                            titleColor: '#666',
                            bodyColor: '#fafafa',
                            callbacks: {
                                label: ctx => `${ctx.parsed.y.toFixed(key === 'aqi' ? 0 : 1)} ${meta.unit}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { tooltipFormat: 'HH:mm', displayFormats: { hour: 'HH:mm' } },
                            grid: { color: '#222' },
                            ticks: { color: '#666', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: { color: '#222' },
                            ticks: {
                                color: '#666',
                                callback: val => `${val} ${meta.unit}`
                            }
                        }
                    }
                },
                plugins: [updatesLabel]
            });
        }

        async function loadChart7d() {
            const res = await fetch(`/api/history7d/${key}`);
            if (!res.ok) {
                document.getElementById('chart7d').closest('.chart-wrapper').innerHTML =
                    '<div class="error-state">Failed to load data.</div>';
                return;
            }
            const points = await res.json();
            if (!points.length) {
                document.getElementById('chart7d').closest('.chart-wrapper').innerHTML =
                    '<div class="error-state">No data available.</div>';
                return;
            }

            const DAY_LABELS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const labels = points.map(p => DAY_LABELS[new Date(p.date + 'T12:00:00').getDay()]);
            const highs = points.map(p => p.high);
            const lows = points.map(p => p.low);

            const overallHigh = Math.max(...highs);
            const overallLow = Math.min(...lows);
            document.getElementById('mm7d-high').textContent = overallHigh.toFixed(0);
            document.getElementById('mm7d-low').textContent = overallLow.toFixed(0);

            const decimals = key === 'aqi' ? 0 : 1;

            new Chart(document.getElementById('chart7d'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            data: highs,
                            borderColor: meta.color,
                            borderWidth: 1.5,
                            pointRadius: 3,
                            tension: 0.3,
                            fill: '+1',
                            backgroundColor: meta.color + '26',
                        },
                        {
                            data: lows,
                            borderColor: meta.color,
                            borderWidth: 1.5,
                            pointRadius: 3,
                            tension: 0.3,
                            fill: 'origin',
                            backgroundColor: meta.color + '59',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#141414',
                            borderColor: '#222',
                            borderWidth: 1,
                            titleColor: '#666',
                            bodyColor: '#fafafa',
                            callbacks: {
                                label: (ctx) => {
                                    const val = ctx.parsed.y.toFixed(decimals);
                                    return ctx.datasetIndex === 0
                                        ? `High: ${val} ${meta.unit}`
                                        : `Low: ${val} ${meta.unit}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#222' },
                            ticks: { color: '#666' }
                        },
                        y: {
                            grid: { color: '#222' },
                            ticks: {
                                color: '#666',
                                callback: val => `${val} ${meta.unit}`
                            }
                        }
                    }
                }
            });
        }

        loadCurrent();
        loadMinMax();
        loadChart();
        loadChart7d();
    </script>
</body>
