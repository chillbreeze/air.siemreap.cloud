<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality - Siem Reap</title>
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/shared.css">
    <link rel="stylesheet" href="/static/css/metric.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">Air Quality Monitor</a></h1>
            <span class="location">Siem Reap, Cambodia</span>
        </header>
        <nav>
            <a href="/" class="nav-link">Home</a>
            <a href="/faq/" class="nav-link">FAQ</a>
        </nav>

        <div class="hero">
            <div class="hero-title" id="metric-name">--</div>
            <div class="hero-current" id="current-value" style="color: var(--text-dim);">--</div>
            <div class="hero-unit" id="metric-unit"></div>
        </div>

        <div class="chart-wrapper">
            <div class="chart-header">
                <div class="chart-title">Last 24 Hours</div>
                <div class="minmax">High <span id="mm-high">--</span> &middot; Low <span id="mm-low">--</span></div>
            </div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <footer>
            <div class="footer-text">Updates every 5 minutes</div>
            <div class="footer-contact">
                <span>Built by Terry</span>
                <span>|</span>
                <a href="https://t.me/ProjectTerry" target="_blank">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.347l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.212z"/></svg>
                    Message me
                </a>
            </div>
        </footer>
    </div>

    <script>
        const METRICS = {
            pm1:        { label: 'PM 1.0',       unit: 'µg/m³', color: '#a855f7', bucketMinutes: 5 },
            pm25:       { label: 'PM 2.5',       unit: 'µg/m³', color: '#f97316', bucketMinutes: 5 },
            pm10:       { label: 'PM 10',         unit: 'µg/m³', color: '#ef4444', bucketMinutes: 5 },
            aqi:        { label: 'AQI',           unit: '',      color: '#22c55e', bucketMinutes: 5 },
            temperature:{ label: 'Temperature',  unit: '°C',    color: '#eab308', bucketMinutes: 5 },
            humidity:   { label: 'Humidity',      unit: '%',     color: '#38bdf8', bucketMinutes: 5 },
            pressure:   { label: 'Pressure',      unit: 'hPa',   color: '#94a3b8', bucketMinutes: 5 },
            heat_index: { label: 'Feels Like',    unit: '°C',    color: '#fb923c', bucketMinutes: 5 },
            dew_point:  { label: 'Dew Point',     unit: '°C',    color: '#34d399', bucketMinutes: 5 },
        };

        function downsample(data, bucketMinutes) {
            const bucketMs = bucketMinutes * 60 * 1000;
            const buckets = {};
            for (const point of data) {
                const key = Math.floor(point.x.getTime() / bucketMs) * bucketMs;
                if (!buckets[key]) buckets[key] = [];
                buckets[key].push(point.y);
            }
            return Object.entries(buckets)
                .sort(([a], [b]) => a - b)
                .map(([ts, vals]) => ({
                    x: new Date(Number(ts) + bucketMs / 2),
                    y: vals.reduce((s, v) => s + v, 0) / vals.length
                }));
        }

        const key = window.location.pathname.split('/').filter(Boolean)[1];
        const meta = METRICS[key] || { label: key, unit: '', color: '#fafafa' };

        document.getElementById('metric-name').textContent = meta.label;
        document.getElementById('metric-unit').textContent = meta.unit;
        document.title = `${meta.label} - Air Quality Siem Reap`;

        async function loadCurrent() {
            const res = await fetch('/api/sensors');
            if (!res.ok) return;
            const data = await res.json();
            const val = data[key];
            if (val === undefined) return;
            const decimals = ['aqi'].includes(key) ? 0 : 1;
            const el = document.getElementById('current-value');
            el.textContent = val.toFixed(decimals);
            el.style.color = meta.color;
        }

        async function loadMinMax() {
            const res = await fetch(`/api/minmax/${key}`);
            if (!res.ok) return;
            const data = await res.json();
            const decimals = ['aqi'].includes(key) ? 0 : 1;
            if (data.max !== null) document.getElementById('mm-high').textContent = data.max.toFixed(0);
            if (data.min !== null) document.getElementById('mm-low').textContent = data.min.toFixed(0);
        }

        async function loadChart() {
            const res = await fetch(`/api/history/${key}`);
            if (!res.ok) {
                document.querySelector('.chart-wrapper').innerHTML =
                    '<div class="error-state">Failed to load data.</div>';
                return;
            }
            const points = await res.json();
            if (!points.length) {
                document.querySelector('.chart-wrapper').innerHTML =
                    '<div class="error-state">No data available.</div>';
                return;
            }

            const raw = meta.bucketMinutes
                ? downsample(points.map(p => ({ x: new Date(p.time), y: p.value })), meta.bucketMinutes)
                : points.map(p => ({ x: new Date(p.time), y: p.value }));

            const WINDOW = 15;
            const data = raw.map((point, i) => {
                const start = Math.max(0, i - Math.floor(WINDOW / 2));
                const end = Math.min(raw.length, start + WINDOW);
                const slice = raw.slice(start, end);
                const avg = slice.reduce((sum, p) => sum + p.y, 0) / slice.length;
                return { x: point.x, y: avg };
            });

            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    datasets: [{
                        data,
                        borderColor: meta.color,
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: true,
                        backgroundColor: meta.color + '18',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#141414',
                            borderColor: '#222',
                            borderWidth: 1,
                            titleColor: '#666',
                            bodyColor: '#fafafa',
                            callbacks: {
                                label: ctx => `${ctx.parsed.y.toFixed(['aqi'].includes(key) ? 0 : 1)} ${meta.unit}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { tooltipFormat: 'HH:mm', displayFormats: { hour: 'HH:mm' } },
                            grid: { color: '#222' },
                            ticks: { color: '#666', maxTicksLimit: 8 }
                        },
                        y: {
                            grid: { color: '#222' },
                            ticks: {
                                color: '#666',
                                callback: val => `${val} ${meta.unit}`
                            }
                        }
                    }
                }
            });
        }

        loadCurrent();
        loadMinMax();
        loadChart();
    </script>
</body>
</html>
